    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10" fill="#38BDF8"/></marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="76" class="h" font-size="44">aicodex Architecture</text>
  <text x="70" y="118" class="s" font-size="22">A user-owned local AI coding system with GUI, agent, router, safe tools and project hygiene.</text>

  <g id="box1" transform="translate(70 190)"><rect width="260" height="110" rx="18" fill="url(#box)" stroke="#334155"/><text x="28" y="44" class="t" font-size="24">Open WebUI</text><text x="28" y="78" class="s" font-size="18">Local ChatGPT-like GUI</text></g>
  <g id="box2" transform="translate(70 385)"><rect width="260" height="110" rx="18" fill="url(#box)" stroke="#334155"/><text x="28" y="44" class="t" font-size="24">Aider</text><text x="28" y="78" class="s" font-size="18">Repo editing agent</text></g>
  <g id="box3" transform="translate(450 190)"><rect width="320" height="110" rx="18" fill="url(#box)" stroke="#38BDF8"/><text x="28" y="44" class="t" font-size="24">Smart Router</text><text x="28" y="78" class="m" font-size="17">127.0.0.1:5050/v1</text></g>
  <g id="box4" transform="translate(450 385)"><rect width="320" height="110" rx="18" fill="url(#box)" stroke="#22C55E"/><text x="28" y="44" class="t" font-size="24">Safe MCP Tools</text><text x="28" y="78" class="s" font-size="18">filesystem • git • shell</text></g>
  <g id="box5" transform="translate(900 145)"><rect width="300" height="300" rx="22" fill="url(#box)" stroke="#A78BFA"/><text x="28" y="44" class="t" font-size="25">Ollama Models</text><text x="28" y="90" class="s" font-size="18">Qwen3-Coder 30B</text><text x="28" y="126" class="s" font-size="18">DeepSeek-R1 32B</text><text x="28" y="162" class="s" font-size="18">Qwen3 30B</text><text x="28" y="198" class="s" font-size="18">Qwen2.5-VL 7B</text><text x="28" y="234" class="s" font-size="18">nomic-embed-text</text></g>
  <g id="box6" transform="translate(900 515)"><rect width="300" height="110" rx="18" fill="url(#box)" stroke="#F59E0B"/><text x="28" y="44" class="t" font-size="24">Project Memory</text><text x="28" y="78" class="s" font-size="18">.ai-memory + archives</text></g>

