      .mono{font-family:"SFMono-Regular","Cascadia Code",Menlo,Consolas,monospace;fill:#E2E8F0}
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;font-weight:700;fill:#E0F2FE}
    </style>
  </defs>
  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="1050" cy="80" r="180" fill="#2563EB" opacity="0.20" filter="url(#glow)"/>
